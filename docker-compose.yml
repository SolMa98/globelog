services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-side}
      MARIADB_USER: ${DB_USERNAME:-side_app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-side_app_pw}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_root_pw}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-15790}:15790"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-side}
      DB_USERNAME: ${DB_USERNAME:-side_app}
      DB_PASSWORD: ${DB_PASSWORD:-side_app_pw}
      # 암호화 키는 기본값이 없음(EncryptedStringConverter가 빈 값이면 기동 자체를 막음) —
      # .env 파일에 반드시 채워 넣을 것. 예: openssl rand -base64 32
      APP_CRYPTO_SECRET_KEY: "${APP_CRYPTO_SECRET_KEY:?APP_CRYPTO_SECRET_KEY를 .env에 설정하세요. openssl rand -base64 32 로 생성}"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:15790}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-changeme123}
      # 업로드 파일은 컨테이너 밖 named volume에 저장(재배포/재생성에도 유지됨)
      APP_STORAGE_MODE: LOCAL
      APP_STORAGE_LOCAL_DIR: /data/uploads
      # 아래는 선택 연동 — 값이 없으면 해당 기능만 개별적으로 비활성화됨(README 참고)
      GMAIL_USERNAME: ${GMAIL_USERNAME:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      # client-id/secret은 비어있으면 앱 기동 자체가 실패(OAuth2ClientProperties 검증) —
      # application.properties와 동일하게 "changeme" placeholder를 기본값으로 맞춘다.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-changeme}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-changeme}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-changeme}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-changeme}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-changeme}
      PORTONE_STORE_ID: ${PORTONE_STORE_ID:-}
      PORTONE_CHANNEL_KEY: ${PORTONE_CHANNEL_KEY:-}
      PORTONE_API_SECRET: ${PORTONE_API_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    volumes:
      - uploads-data:/data/uploads

volumes:
  db-data:
  uploads-data: