spring.application.name=globelog

# 프로젝트 루트의 local-secrets.properties(gitignore 처리됨)를 있으면 불러온다 — 로컬 개발용
# 비밀 값(APP_CRYPTO_SECRET_KEY 등)을 셸 프로필 대신 이 파일 하나로 관리하기 위함.
# optional: 이라 파일이 없어도(운영 환경 등) 기동에는 영향 없음.
spring.config.import=optional:file:./local-secrets.properties

# MariaDB
# username/password는 로컬 개발용 기본값이 그대로 git에 남아있던 값 — 운영에서는
# DB_USERNAME/DB_PASSWORD 환경변수로 반드시 덮어쓸 것.
spring.datasource.url=jdbc:mariadb://localhost:3306/side?useUnicode=true&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:side_app}
spring.datasource.password=${DB_PASSWORD:side_app_pw}

# JPA
# 별도 마이그레이션 도구(Flyway 등) 없이 운용하는 사이드 프로젝트 규모라 ddl-auto=update 사용
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Spring Session (JDBC)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# 세션 쿠키 보안 속성. secure=true는 HTTPS로만 쿠키가 전송되게 하므로 로컬 HTTP 개발
# 환경에서는 로그인 자체가 깨진다 — 운영(HTTPS) 배포 시에만 SESSION_COOKIE_SECURE=true로 켤 것.
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax

# 파일 저장소 — 게시글(여행) 이미지 저장 방식. LOCAL: 프로젝트 밖 로컬 디렉터리.
# SCP: SSH(SFTP)로 외부 서버의 특정 디렉터리에 저장. 조회(/uploads/**)도 같은 방식으로 처리됨.
app.storage.mode=${APP_STORAGE_MODE:LOCAL}
# 저장 경로 최상위 폴더명("프로젝트/년/월/일" 구조에서 프로젝트 부분)
app.storage.project-name=${APP_STORAGE_PROJECT_NAME:globelog}

# LOCAL 모드 — 기본값도 프로젝트 디렉터리 밖(사용자 홈)을 가리키게 해서, git clean/재배포로
# 업로드 파일이 실수로 함께 지워지는 걸 막는다.
app.storage.local.base-dir=${APP_STORAGE_LOCAL_DIR:${user.home}/globelog-uploads}

# SCP 모드 — auth-method는 PASSWORD 또는 PRIVATE_KEY. known-hosts에 등록된 호스트 키만
# 신뢰하므로(strict-host-key-checking=true), 최초 연결 전에 반드시
# `ssh-keyscan -H <host> >> ~/.ssh/known_hosts` 등으로 등록해둘 것.
app.storage.scp.host=${APP_STORAGE_SCP_HOST:}
app.storage.scp.port=${APP_STORAGE_SCP_PORT:22}
app.storage.scp.username=${APP_STORAGE_SCP_USERNAME:}
app.storage.scp.auth-method=${APP_STORAGE_SCP_AUTH_METHOD:PASSWORD}
app.storage.scp.password=${APP_STORAGE_SCP_PASSWORD:}
app.storage.scp.private-key-path=${APP_STORAGE_SCP_PRIVATE_KEY_PATH:}
app.storage.scp.private-key-passphrase=${APP_STORAGE_SCP_PRIVATE_KEY_PASSPHRASE:}
app.storage.scp.remote-dir=${APP_STORAGE_SCP_REMOTE_DIR:/var/globelog/uploads}
app.storage.scp.known-hosts-path=${APP_STORAGE_SCP_KNOWN_HOSTS_PATH:${user.home}/.ssh/known_hosts}
app.storage.scp.strict-host-key-checking=${APP_STORAGE_SCP_STRICT_HOST_KEY_CHECKING:true}
app.storage.scp.connect-timeout-seconds=${APP_STORAGE_SCP_CONNECT_TIMEOUT_SECONDS:10}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf (개발 중 템플릿 캐시 비활성화)
spring.thymeleaf.cache=false

# 정적 리소스 캐시 비활성화 (개발 중 CSS/JS 즉시 반영)
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true

# Bootstrap admin account — 운영에서는 ADMIN_BOOTSTRAP_PASSWORD 환경변수로 반드시 덮어쓸 것
# (첫 로그인 후 /admin/login에서 비밀번호를 변경해도, 이 기본값이 git에 남아있는 한
# 재배포 시 초기화되지 않도록 별도 값을 넣어두는 게 안전하다).
app.admin.bootstrap-username=admin
app.admin.bootstrap-password=${ADMIN_BOOTSTRAP_PASSWORD:changeme123}

# 관리자(/admin/**) IP 화이트리스트 킬스위치 — 목록 자체는 DB(admin_ip_whitelist
# 테이블, /admin/ip-whitelist 화면)로 관리하지만, 켜고 끄는 스위치는 서버 재시작이
# 필요한 설정파일에 둔다(운영자가 화이트리스트를 잘못 등록해 스스로 잠기더라도, 이 값을
# false로 되돌리고 재시작하면 즉시 복구 가능하게 하기 위함). 기본값 false(비활성).
# 켤 때는 반드시 /admin/ip-whitelist에서 본인 IP를 먼저 등록해두고 켤 것 — loopback
# (127.0.0.1/::1)은 항상 허용되지만, 원격 서버라면 SSH 등으로 직접 들어가야 한다.
app.admin.ip-whitelist.enabled=${ADMIN_IP_WHITELIST_ENABLED:false}

# 민감 정보(TOTP 시크릿 등) 암호화 키 — 반드시 환경변수(APP_CRYPTO_SECRET_KEY)로 채울 것.
# 기본값을 두지 않음: 값이 비어 있으면 EncryptedStringConverter가 기동 시점에 예외를 던져
# 안전하지 않은 기본 키로 조용히 동작하는 상황을 막는다.
# 로컬 개발 시 생성 예: openssl rand -base64 32
app.crypto.secret-key=${APP_CRYPTO_SECRET_KEY:}

# 회원 가입 시 발송하는 인증 메일에 실을 서비스 base URL(링크 생성용)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# PortOne(다날 채널) 실명 본인인증 — https://admin.portone.io 콘솔에서 발급.
# store-id/channel-key는 클라이언트(JS)에 그대로 노출되는 공개 값이고, api-secret만 서버 전용 비밀.
portone.store-id=${PORTONE_STORE_ID:}
portone.channel-key=${PORTONE_CHANNEL_KEY:}
portone.api-secret=${PORTONE_API_SECRET:}

# Gmail SMTP — Google 계정에서 2단계 인증 활성화 후 발급받은 "앱 비밀번호"를 사용할 것
# (일반 로그인 비밀번호는 동작하지 않음). 실제 값은 환경변수로 채워 넣는다.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 소셜 로그인(Google/Naver/Kakao) — 각 콘솔에서 발급받은 값을 환경변수로 채워 넣을 것.
# 리디렉션(콜백) URI는 기본 패턴 그대로 사용: {base-url}/login/oauth2/code/{registrationId}
# client-id/secret에 실제 값 대신 placeholder("changeme")를 기본값으로 둔 이유: Spring Boot가
# 부팅 시 OAuth2ClientProperties에서 client-id 공백을 막아서(IllegalStateException), 값이 비어
# 있으면 앱 전체가 기동조차 안 됨 — 값을 채우기 전까지는 placeholder로 기동만 되게 하고,
# 실제 로그인 버튼을 누르면 provider가 invalid_client로 거절하는 정도로 실패가 격리되게 함.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# 카카오는 기본적으로(콘솔에서 "Client Secret 사용"을 켜지 않으면) 시크릿 없이 동작하는
# public client라 client-authentication-method=none으로 둠. 콘솔에서 보안 강화를 켰다면
# client-secret 값을 채우고 이 값을 client_secret_post로 바꿀 것.
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=none
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
