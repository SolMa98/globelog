spring.application.name=globelog

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/side?useUnicode=true&characterEncoding=utf8
spring.datasource.username=side_app
spring.datasource.password=side_app_pw

# JPA
# 별도 마이그레이션 도구(Flyway 등) 없이 운용하는 사이드 프로젝트 규모라 ddl-auto=update 사용
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Spring Session (JDBC)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

# File upload
app.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf (개발 중 템플릿 캐시 비활성화)
spring.thymeleaf.cache=false

# 정적 리소스 캐시 비활성화 (개발 중 CSS/JS 즉시 반영)
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-cache=true

# Bootstrap admin account
app.admin.bootstrap-username=admin
app.admin.bootstrap-password=changeme123

# 민감 정보(TOTP 시크릿 등) 암호화 키 — 운영에서는 반드시 환경변수(APP_CRYPTO_SECRET_KEY)로
# 별도 관리하고, 아래 기본값을 그대로 쓰지 말 것.
app.crypto.secret-key=${APP_CRYPTO_SECRET_KEY:change-this-secret-key-in-production}

# 회원 가입 시 발송하는 인증 메일에 실을 서비스 base URL(링크 생성용)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# PortOne(다날 채널) 실명 본인인증 — https://admin.portone.io 콘솔에서 발급.
# store-id/channel-key는 클라이언트(JS)에 그대로 노출되는 공개 값이고, api-secret만 서버 전용 비밀.
portone.store-id=${PORTONE_STORE_ID:}
portone.channel-key=${PORTONE_CHANNEL_KEY:}
portone.api-secret=${PORTONE_API_SECRET:}

# Gmail SMTP — Google 계정에서 2단계 인증 활성화 후 발급받은 "앱 비밀번호"를 사용할 것
# (일반 로그인 비밀번호는 동작하지 않음). 실제 값은 환경변수로 채워 넣는다.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 소셜 로그인(Google/Naver/Kakao) — 각 콘솔에서 발급받은 값을 환경변수로 채워 넣을 것.
# 리디렉션(콜백) URI는 기본 패턴 그대로 사용: {base-url}/login/oauth2/code/{registrationId}
# client-id/secret에 실제 값 대신 placeholder("changeme")를 기본값으로 둔 이유: Spring Boot가
# 부팅 시 OAuth2ClientProperties에서 client-id 공백을 막아서(IllegalStateException), 값이 비어
# 있으면 앱 전체가 기동조차 안 됨 — 값을 채우기 전까지는 placeholder로 기동만 되게 하고,
# 실제 로그인 버튼을 누르면 provider가 invalid_client로 거절하는 정도로 실패가 격리되게 함.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# 카카오는 기본적으로(콘솔에서 "Client Secret 사용"을 켜지 않으면) 시크릿 없이 동작하는
# public client라 client-authentication-method=none으로 둠. 콘솔에서 보안 강화를 켰다면
# client-secret 값을 채우고 이 값을 client_secret_post로 바꿀 것.
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:changeme}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=none
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
