<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Globelog · 여행 피드</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#070a11">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="feed-view">
    <header id="feed-header">
        <h1><img src="/favicon.svg" alt="" width="24" height="24" style="vertical-align:-5px;margin-right:6px">Globelog</h1>
        <div id="account-box"></div>
    </header>

    <div id="feed-hero" class="hidden">
        <div id="feed-hero-globe" aria-hidden="true">
            <span class="feed-hero-dot" style="top:28%;left:32%"></span>
            <span class="feed-hero-dot" style="top:52%;left:60%"></span>
            <span class="feed-hero-dot" style="top:64%;left:24%"></span>
        </div>
        <div id="feed-hero-text">
            <div id="feed-hero-count">0<span>개국</span></div>
            <div id="feed-hero-sub">전 세계의 0% 방문 완료</div>
        </div>
    </div>

    <div id="feed-filters">
        <button type="button" class="feed-filter-tab active" data-filter="all">전체</button>
        <button type="button" class="feed-filter-tab" data-filter="following">팔로잉</button>
        <button type="button" class="feed-filter-tab" data-filter="popular">인기</button>
    </div>

    <div id="feed-list"></div>
    <p id="feed-loading">불러오는 중...</p>
    <p id="feed-empty" class="hidden">아직 피드에 표시할 게시글이 없습니다.</p>
</div>

<nav id="bottom-nav">
    <a href="/" class="bn-item active">
        <svg class="bn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>
        피드
    </a>
    <a href="/login" id="bn-globe" class="bn-item">
        <svg class="bn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><ellipse cx="12" cy="12" rx="4" ry="9" stroke="currentColor" stroke-width="1.8"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.8"/></svg>
        지구본
    </a>
    <a href="/login" id="bn-trips" class="bn-item">
        <svg class="bn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 20l5-3 6 3 5-3V4l-5 3-6-3-5 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="9" y1="4" x2="9" y2="17" stroke="currentColor" stroke-width="1.8"/><line x1="15" y1="7" x2="15" y2="20" stroke="currentColor" stroke-width="1.8"/></svg>
        내 여행
    </a>
    <a href="/login" id="bn-profile" class="bn-item">
        <svg class="bn-icon" width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        프로필
    </a>
</nav>

<script src="/js/country-color.js"></script>
<script src="/js/csrf.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/feed.js"></script>
<script src="/js/pwa.js"></script>
<script>
(function () {
    // 하단 네비게이션의 "지구본"/"내 여행"/"프로필" 링크는 로그인한 사용자에게만
    // 실제 목적지를 알 수 있으므로(내 지구본 = /u/{nickname}/globe 등), auth.js와
    // 동일한 /api/me 응답을 한 번 더 읽어 href를 채워준다.
    fetch('/api/me')
        .then(function (res) { return res.json(); })
        .then(function (me) {
            var globeLink = document.getElementById('bn-globe');
            var tripsLink = document.getElementById('bn-trips');
            var profileLink = document.getElementById('bn-profile');
            if (me.loggedIn) {
                globeLink.href = '/u/' + encodeURIComponent(me.nickname) + '/globe';
                tripsLink.href = '/my/trips';
                profileLink.href = '/u/' + encodeURIComponent(me.nickname);
            }
        })
        .catch(function () {});
})();
</script>
</body>
</html>
