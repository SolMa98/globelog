<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Globelog · 채팅</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/vendor/sweetalert2.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="chat-app">
<a th:href="@{/}" id="login-back-btn">← 피드로</a>
<header class="chat-app-header">
    <span class="chat-app-title">채팅</span>
    <a th:href="@{/my/chat/new}" class="chat-app-new-btn" aria-label="새 대화">+</a>
</header>
<div class="chat-push-banner" id="chat-push-banner" style="display:none">
    <span>🔔 새 메시지가 오면 브라우저 알림을 받아보세요.</span>
    <button type="button" id="chat-push-enable-btn" class="btn btn-secondary btn-sm">알림 켜기</button>
</div>
<ul class="chat-room-list" id="chat-room-list"></ul>
<p class="empty" id="chat-room-empty" style="display:none">아직 대화가 없습니다. "+" 버튼으로 새 대화를 시작해보세요.</p>

<script th:src="@{/js/vendor/sweetalert2.all.min.js}"></script>
<script th:src="@{/js/admin-modal.js}"></script>
<script th:src="@{/js/csrf.js}"></script>
<script th:src="@{/js/pwa.js}"></script>
<script th:src="@{/js/push.js}"></script>
<script th:src="@{/js/chat-rooms.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
