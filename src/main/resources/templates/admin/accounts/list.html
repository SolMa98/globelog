<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Globelog · 계정 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/vendor/sweetalert2.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<div class="admin-shell">
<div th:replace="~{admin/fragments/nav}"></div>
<main class="page">
    <div class="content-topbar">
        <nav class="breadcrumb">
            <span>Globelog Admin</span>
            <span class="breadcrumb-sep">›</span>
            <span>계정 관리</span>
        </nav>
        <div class="content-topbar-actions">
            <button type="button" id="open-account-create" class="btn btn-primary btn-sm">+ 계정 추가</button>
            <button type="button" class="btn-icon" onclick="window.location.reload()" aria-label="새로고침">↻</button>
        </div>
    </div>
    <div class="table-card">
        <div class="list-toolbar">
            <h2 class="list-toolbar-title">
                관리자 계정
                <span class="total-count">총 <span th:text="${accounts.totalElements}"></span>건</span>
            </h2>
            <form method="get" th:action="@{/admin/accounts}" class="search-group" style="margin:0">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="아이디 검색">
                <button type="submit" aria-label="검색">🔍</button>
            </form>
        </div>
        <table>
            <thead>
            <tr>
                <th>아이디</th>
                <th>역할</th>
                <th>생성일</th>
                <th style="text-align:right">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="account : ${accounts}">
                <td th:text="${account.username}"></td>
                <td>
                    <span th:if="${account.role.name() == 'SUPER_ADMIN'}" class="badge">최상위 관리자</span>
                    <span th:unless="${account.role.name() == 'SUPER_ADMIN'}" class="badge badge-gray">모더레이터</span>
                </td>
                <td class="muted" th:text="${account.createdAt}"></td>
                <td style="text-align:right">
                    <form th:action="@{/admin/accounts/{id}/delete(id=${account.id})}" method="post"
                          class="js-delete-account" style="display:inline;gap:0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-ghost btn-sm">삭제</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${accounts.isEmpty()}">
                <td colspan="4" class="empty">등록된 계정이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        <div class="list-footer" th:if="${accounts.totalPages > 0}">
            <div class="page-size-wrap">
                <button type="button" class="page-size-btn" data-page-size-dec aria-label="줄이기">−</button>
                <input type="number" class="page-size-input" data-page-size-input
                       min="5" max="200" th:value="${accounts.size}" aria-label="페이지당 행 수">
                <button type="button" class="page-size-btn" data-page-size-inc aria-label="늘리기">+</button>
            </div>
            <ul class="pagination" aria-label="페이지 탐색">
                <li th:class="${accounts.first} ? 'paging-nav disabled' : 'paging-nav'">
                    <a th:href="${accounts.first} ? '#' : @{/admin/accounts(page=0,keyword=${keyword})}"
                       th:attr="tabindex=${accounts.first} ? '-1' : null,aria-disabled=${accounts.first} ? 'true' : null"
                       aria-label="처음">«</a>
                </li>
                <li th:class="${accounts.first} ? 'paging-nav disabled' : 'paging-nav'">
                    <a th:href="${accounts.first} ? '#' : @{/admin/accounts(page=${accounts.number - 1},keyword=${keyword})}"
                       th:attr="tabindex=${accounts.first} ? '-1' : null,aria-disabled=${accounts.first} ? 'true' : null"
                       aria-label="이전">‹</a>
                </li>
                <li class="paging-sep" role="separator"></li>
                <li th:each="i : ${#numbers.sequence(0, accounts.totalPages - 1)}"
                    th:if="${i >= accounts.number - 2 and i <= accounts.number + 2}"
                    th:class="${i == accounts.number} ? 'paging-num active' : 'paging-num'">
                    <a th:href="@{/admin/accounts(page=${i},keyword=${keyword})}"
                       th:text="${i + 1}"
                       th:attr="aria-current=${i == accounts.number} ? 'page' : null"></a>
                </li>
                <li class="paging-sep" role="separator"></li>
                <li th:class="${accounts.last} ? 'paging-nav disabled' : 'paging-nav'">
                    <a th:href="${accounts.last} ? '#' : @{/admin/accounts(page=${accounts.number + 1},keyword=${keyword})}"
                       th:attr="tabindex=${accounts.last} ? '-1' : null,aria-disabled=${accounts.last} ? 'true' : null"
                       aria-label="다음">›</a>
                </li>
                <li th:class="${accounts.last} ? 'paging-nav disabled' : 'paging-nav'">
                    <a th:href="${accounts.last} ? '#' : @{/admin/accounts(page=${accounts.totalPages - 1},keyword=${keyword})}"
                       th:attr="tabindex=${accounts.last} ? '-1' : null,aria-disabled=${accounts.last} ? 'true' : null"
                       aria-label="마지막">»</a>
                </li>
            </ul>
        </div>
    </div>
</main>
</div>

<!-- ── 계정 추가 모달 ────────────────────────────── -->
<div id="account-create-modal" class="modal-backdrop">
    <div class="modal">
        <div class="modal-header">
            <h2>계정 추가</h2>
            <button type="button" class="modal-close" data-modal-close aria-label="닫기">×</button>
        </div>
        <form th:action="@{/admin/accounts}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <label>
                    아이디
                    <input type="text" name="username" required autocomplete="off">
                </label>
                <label>
                    비밀번호
                    <input type="password" name="password" required minlength="8" autocomplete="new-password">
                </label>
                <label>
                    역할
                    <select name="role">
                        <option value="SUPER_ADMIN">최상위 관리자 (전체 권한)</option>
                        <option value="MODERATOR">모더레이터 (국가/지역 관리만)</option>
                    </select>
                </label>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" data-modal-close>취소</button>
                <button type="submit" class="btn btn-primary">추가</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/vendor/sweetalert2.all.min.js}"></script>
<script th:src="@{/js/admin-modal.js}"></script>
<script th:src="@{/js/admin-accounts.js}"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
