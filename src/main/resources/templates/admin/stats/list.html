<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Globelog · 통계</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<div class="admin-shell">
<div th:replace="~{admin/fragments/nav}"></div>
<main class="page">
    <div class="content-topbar">
        <nav class="breadcrumb">
            <span>Globelog Admin</span>
            <span class="breadcrumb-sep">›</span>
            <span>통계</span>
        </nav>
        <div class="content-topbar-actions">
            <a class="btn btn-secondary btn-sm" th:href="@{/admin/stats/export}">⬇ 엑셀 다운로드</a>
        </div>
    </div>
    <p class="muted" style="margin:-8px 0 16px;font-size:13px">
        ⓘ 전체 사용자의 여행 기록을 합산한 통계입니다(공개범위와 무관하게 비공개·친구공개 여행 포함). 개인별 통계는 아직 제공하지 않습니다.
    </p>

    <div class="stats-grid">
        <div class="card stat-card">
            <div class="stat-label">방문 국가</div>
            <div class="stat-number" id="stat-visited-count">-</div>
            <div class="stat-sub" id="stat-visited-sub"></div>
            <div class="chart-box chart-box-sm">
                <canvas id="chart-visited"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="list-toolbar-title">연도별 여행 횟수</h2>
            <div class="chart-box">
                <canvas id="chart-yearly"></canvas>
            </div>
        </div>

        <div class="card stats-grid-full">
            <h2 class="list-toolbar-title">대륙별 방문 커버리지</h2>
            <div class="chart-box">
                <canvas id="chart-continent"></canvas>
            </div>
        </div>
    </div>

    <h2 class="stats-section-title">활동 통계</h2>
    <p class="muted" style="margin:-8px 0 16px;font-size:13px">ⓘ 전체 사용자(관리자 포함) 합산입니다.</p>
    <div class="stats-grid-tiles">
        <div class="card stat-card">
            <div class="stat-label">조회수</div>
            <div class="stat-number" id="activity-view-count">-</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">채팅 메시지</div>
            <div class="stat-number" id="activity-chat-count">-</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">게시글 등록</div>
            <div class="stat-number" id="activity-trip-create">-</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">게시글 수정</div>
            <div class="stat-number" id="activity-trip-update">-</div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">게시글 삭제</div>
            <div class="stat-number" id="activity-trip-delete">-</div>
        </div>
    </div>

    <h2 class="stats-section-title">파일 저장 용량</h2>
    <p class="muted" style="margin:-8px 0 16px;font-size:13px">ⓘ 관리자만 볼 수 있습니다.</p>
    <div class="stats-grid-tiles">
        <div class="card stat-card">
            <div class="stat-label">영구 저장 파일 (게시글 사진)</div>
            <div class="stat-number" id="storage-permanent">-</div>
            <div class="stat-sub" id="storage-permanent-sub"></div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">채팅 첨부파일 (3개월 후 삭제)</div>
            <div class="stat-number" id="storage-chat">-</div>
            <div class="stat-sub" id="storage-chat-sub"></div>
        </div>
        <div class="card stat-card">
            <div class="stat-label">일주일 내 삭제 예정</div>
            <div class="stat-number" id="storage-expiring">-</div>
            <div class="stat-sub" id="storage-expiring-sub"></div>
        </div>
    </div>
</main>
</div>
<script th:src="@{/js/admin.js}"></script>
<script th:src="@{/js/vendor/chart.min.js}"></script>
<script th:src="@{/js/stats-charts.js}"></script>
<script th:src="@{/js/activity-stats.js}"></script>
<script th:src="@{/js/admin-stats.js}"></script>
</body>
</html>
