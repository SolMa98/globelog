<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Globelog · 비밀번호 변경</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
<div class="admin-shell">
<div th:replace="~{admin/fragments/nav}"></div>
<main class="page">
    <div class="content-topbar">
        <nav class="breadcrumb">
            <span>Globelog Admin</span>
            <span class="breadcrumb-sep">›</span>
            <span>비밀번호 변경</span>
        </nav>
    </div>
    <div class="table-card" style="max-width:420px">
        <p th:if="${forced}" class="info" style="margin-top:0">
            초기 비밀번호를 그대로 사용 중입니다. 계속 진행하려면 먼저 비밀번호를 변경해주세요.
        </p>
        <p th:if="${error}" class="error" th:text="${error}"></p>
        <form th:action="@{/admin/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                현재 비밀번호
                <input type="password" name="currentPassword" required autocomplete="current-password">
            </label>
            <label>
                새 비밀번호
                <input type="password" name="newPassword" required minlength="8" autocomplete="new-password">
            </label>
            <label>
                새 비밀번호 확인
                <input type="password" name="confirmPassword" required minlength="8" autocomplete="new-password">
            </label>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">변경</button>
        </form>
    </div>
</main>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
