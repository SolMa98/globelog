<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Globelog · 비밀번호 변경</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="login-page">
<div class="login-wrap">
    <form class="login-form card" th:action="@{/admin/change-password}" method="post">
        <div class="login-brand"><img th:src="@{/favicon.svg}" alt="Globelog"></div>
        <h1>비밀번호 변경</h1>
        <p th:if="${forced}" class="info" style="text-align:center;margin:0">
            초기 비밀번호를 그대로 사용 중입니다. 계속 진행하려면 먼저 비밀번호를 변경해주세요.
        </p>
        <p th:if="${error}" class="error" style="text-align:center;margin:0" th:text="${error}"></p>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>
            현재 비밀번호
            <input type="password" name="currentPassword" required autocomplete="current-password">
        </label>
        <label>
            새 비밀번호
            <input type="password" name="newPassword" required minlength="8" autocomplete="new-password">
        </label>
        <label>
            새 비밀번호 확인
            <input type="password" name="confirmPassword" required minlength="8" autocomplete="new-password">
        </label>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px">변경</button>
    </form>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
