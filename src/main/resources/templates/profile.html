<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${nickname} + ' · Globelog'">프로필</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="login-page">
<div class="login-wrap">
    <div class="card profile-card" id="profile-card" th:attr="data-nickname=${nickname}">
        <div class="profile-avatar" id="profile-avatar"></div>
        <h1 id="profile-nickname">-</h1>
        <p id="profile-subtitle" class="muted">-</p>

        <div class="profile-stats">
            <div class="profile-stat profile-stat-accent">
                <div class="profile-stat-num" id="stat-country">-</div>
                <div class="profile-stat-label">방문국가</div>
            </div>
            <div class="profile-stat">
                <div class="profile-stat-num" id="stat-trips">-</div>
                <div class="profile-stat-label">여행 기록</div>
            </div>
            <div class="profile-stat">
                <div class="profile-stat-num" id="stat-followers">-</div>
                <div class="profile-stat-label">팔로워</div>
            </div>
        </div>

        <div id="profile-actions" class="profile-actions"></div>

        <p class="profile-footer-links">
            <a th:href="@{/}">← 피드로</a> · <a th:href="@{'/u/' + ${nickname} + '/globe'}">지구본 보기</a>
        </p>
    </div>
</div>
<script th:src="@{/js/profile.js}"></script>
</body>
</html>
