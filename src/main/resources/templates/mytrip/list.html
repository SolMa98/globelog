<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Globelog · 내 여행 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/vendor/sweetalert2.min.css}">
    <link rel="stylesheet" th:href="@{/css/vendor/tom-select.min.css}">
    <link rel="stylesheet" th:href="@{/css/vendor/flatpickr.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <script th:src="@{/js/country-color.js}"></script>
</head>
<body class="admin-body">
<div class="admin-shell">
<main class="page">
    <div class="content-topbar">
        <nav class="breadcrumb">
            <a th:href="@{/}">← 피드로</a>
            <span class="breadcrumb-sep">›</span>
            <span>내 여행 관리</span>
        </nav>
        <div class="content-topbar-actions">
            <button type="button" id="open-trip-create" class="btn btn-primary btn-sm">+ 여행 등록</button>
            <button type="button" id="theme-toggle-btn" class="btn-icon" aria-label="테마 전환"><span id="theme-toggle-icon">☀️</span></button>
        </div>
    </div>
    <div class="table-card">
        <div class="list-toolbar">
            <h2 class="list-toolbar-title">
                내 여행 목록
                <span class="total-count">총 <span th:text="${trips.size()}"></span>건</span>
            </h2>
        </div>
        <table>
            <thead>
            <tr>
                <th>국가</th>
                <th>지역</th>
                <th>제목</th>
                <th>방문일</th>
                <th>공개범위</th>
                <th>조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="trip : ${trips}" class="js-row-edit" th:data-id="${trip.id}">
                <td><span class="badge js-country-badge" th:attr="data-iso=${trip.country.isoA3}" th:text="${trip.country.nameKo}"></span></td>
                <td th:text="${trip.region != null ? trip.region.nameKo : '—'}"></td>
                <td th:text="${trip.title}"></td>
                <td class="muted" th:text="${trip.visitedDate}"></td>
                <td>
                    <span th:if="${trip.visibility.name() == 'PUBLIC'}" class="badge badge-success">전체공개</span>
                    <span th:if="${trip.visibility.name() == 'FOLLOWERS_ONLY'}" class="badge">친구공개</span>
                    <span th:if="${trip.visibility.name() == 'PRIVATE'}" class="badge badge-gray">비공개</span>
                </td>
                <td class="muted" th:text="${trip.viewCount}"></td>
            </tr>
            <tr th:if="${trips.isEmpty()}">
                <td colspan="6" class="empty">등록된 여행이 없습니다. "+ 여행 등록"으로 첫 여행을 남겨보세요.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</div>

<!-- ── 여행 등록 모달 ────────────────────────────── -->
<div id="trip-create-modal" class="modal-backdrop">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h2>여행 등록</h2>
            <button type="button" class="modal-close" data-modal-close aria-label="닫기">×</button>
        </div>
        <form id="trip-create-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="modal-body">
                <label>
                    국가
                    <select name="countryId" id="create-country" required>
                        <option value="">국가 선택</option>
                        <option th:each="c : ${countries}" th:value="${c.id}" th:text="${c.nameKo}"></option>
                    </select>
                </label>
                <label>
                    지역 <span class="muted" style="font-weight:400;font-size:12px">(선택 사항)</span>
                    <select name="regionId" id="create-region">
                        <option value="">지역 선택</option>
                    </select>
                </label>
                <label>
                    여행 제목
                    <input type="text" name="title" required>
                </label>
                <label>
                    대표 사진 <span class="muted" style="font-weight:400;font-size:12px">(선택 사항 · JPEG면 촬영일자를 자동으로 채워요)</span>
                    <input type="file" id="create-cover-photo" accept="image/*">
                </label>
                <label>
                    여행 기간
                    <input type="text" id="create-date-range" class="flatpickr-input" placeholder="날짜를 선택하세요" readonly="readonly">
                    <input type="hidden" name="visitedDate" id="create-visited-date">
                    <input type="hidden" name="endDate" id="create-end-date">
                </label>
                <label>
                    공개범위
                    <select name="visibility" id="create-visibility">
                        <option value="PUBLIC">전체공개</option>
                        <option value="FOLLOWERS_ONLY">친구공개</option>
                        <option value="PRIVATE">비공개(나만보기)</option>
                    </select>
                </label>
                <label>
                    설명
                    <textarea name="description" rows="4"></textarea>
                </label>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" data-modal-close>취소</button>
                <button type="submit" class="btn btn-primary">등록</button>
            </div>
        </form>
    </div>
</div>

<!-- ── 여행 수정 모달 ────────────────────────────── -->
<div id="trip-edit-modal" class="modal-backdrop">
    <div class="modal modal-wide">
        <div class="modal-header">
            <h2>여행 수정</h2>
            <button type="button" class="modal-close" data-modal-close aria-label="닫기">×</button>
        </div>
        <div class="modal-body">
            <form id="trip-edit-form" class="js-trip-edit-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>
                    국가
                    <select name="countryId" id="edit-country" required>
                        <option value="">국가 선택</option>
                        <option th:each="c : ${countries}" th:value="${c.id}" th:text="${c.nameKo}"></option>
                    </select>
                </label>
                <label>
                    지역 <span class="muted" style="font-weight:400;font-size:12px">(선택 사항)</span>
                    <select name="regionId" id="edit-region">
                        <option value="">지역 선택</option>
                    </select>
                </label>
                <label>
                    여행 제목
                    <input type="text" name="title" required>
                </label>
                <label>
                    여행 기간
                    <input type="text" id="edit-date-range" class="flatpickr-input" placeholder="날짜를 선택하세요" readonly="readonly">
                    <input type="hidden" name="visitedDate" id="edit-visited-date">
                    <input type="hidden" name="endDate" id="edit-end-date">
                </label>
                <label>
                    공개범위
                    <select name="visibility" id="edit-visibility">
                        <option value="PUBLIC">전체공개</option>
                        <option value="FOLLOWERS_ONLY">친구공개</option>
                        <option value="PRIVATE">비공개(나만보기)</option>
                    </select>
                </label>
                <label>
                    설명
                    <textarea name="description" rows="4"></textarea>
                </label>
            </form>
            <div>
                <p class="modal-section-title">사진</p>
                <ul class="image-grid js-image-grid"></ul>
                <p class="empty js-image-empty">등록된 사진이 없습니다.</p>
                <form class="upload-row js-image-upload-form" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="file" name="file" accept="image/*" required>
                    <button type="submit" class="btn btn-secondary btn-sm">사진 추가</button>
                </form>
            </div>
            <div class="card danger-zone">
                <div>
                    <strong>여행 삭제</strong>
                    <p class="muted">등록된 사진도 함께 삭제됩니다.</p>
                </div>
                <form class="js-trip-delete-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger">삭제</button>
                </form>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-ghost" data-modal-close>취소</button>
            <button type="submit" form="trip-edit-form" class="btn btn-primary">저장</button>
        </div>
    </div>
</div>

<script th:src="@{/js/vendor/sweetalert2.all.min.js}"></script>
<script th:src="@{/js/vendor/tom-select.complete.min.js}"></script>
<script th:src="@{/js/vendor/flatpickr.min.js}"></script>
<script th:src="@{/js/vendor/flatpickr-ko.js}"></script>
<script th:src="@{/js/admin-modal.js}"></script>
<script th:src="@{/js/exif-date.js}"></script>
<script th:src="@{/js/mytrip.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
